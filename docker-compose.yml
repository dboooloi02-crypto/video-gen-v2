version: "3.9"

services:
  video-gen:
    build: .
    container_name: video-gen-v2
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4/}
      - LLM_MODEL=${LLM_MODEL:-glm-4-flash}
      - DEFAULT_TEMPLATE=${DEFAULT_TEMPLATE:-english_learning}
    volumes:
      - ./output:/app/output       # generated videos
      - ./cache:/app/cache         # render cache
      - ./fonts:/app/fonts         # custom fonts
    deploy:
      resources:
        limits:
          memory: 2G               # PIL + numpy is memory-hungry
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
